<!-- BOARDGAME COLLECTION + PLAY LOG -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#21453D; --felt2:#2C594C; --bg:#F2EDE1; --paper:#FBF8F1;
  --card:#FFFFFF; --ink:#221F19; --muted:#8A8170; --line:#E7DFCF;
  --jh:#3A6EA5; --ny:#E07A5F; --gold:#CC9A3E; --owned:#4E876A; --gone:#B05C4E;
  --mint:#AEC9B9; --mint2:#C6D9CC;
  --shadow:0 1px 2px rgba(34,31,25,.05),0 8px 22px rgba(34,31,25,.07);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Gowun Dodum",system-ui,sans-serif;line-height:1.55;}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1120px;margin:0 auto;padding:0 18px 90px}

/* HEADER / felt table */
.hero{background:linear-gradient(150deg,var(--felt2) 0%,var(--felt) 70%);
  color:#F4EFE2;border-radius:0 0 26px 26px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.12),0 12px 26px rgba(33,69,61,.22);
  padding:22px 26px 26px;margin-bottom:22px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;opacity:.05;pointer-events:none;
  background-image:radial-gradient(circle at 18% 30%,#fff 0 .5px,transparent 1.5px),
   radial-gradient(circle at 66% 72%,#fff 0 .5px,transparent 1.5px);
  background-size:40px 40px,32px 32px}
.hero-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px}
.meeples{display:flex;gap:-8px;align-items:center}
.meeple{width:32px;height:38px;margin-left:-8px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.22))}
.meeple:first-child{margin-left:0}
.spacer{flex:1}
.tools{display:flex;gap:8px}
.ghost{background:rgba(255,255,255,.12);color:#F4EFE2;border:1px solid rgba(255,255,255,.25);
  border-radius:11px;padding:9px 13px;font-size:13px;transition:.15s}
.ghost:hover{background:rgba(255,255,255,.22)}

.stats{display:flex;gap:14px;margin-top:22px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);
  border-radius:16px;padding:13px 18px;min-width:120px;backdrop-filter:blur(2px)}
.stat .n{font-family:"Black Han Sans";font-size:30px;line-height:1;color:#fff}
.stat .l{font-size:12px;color:var(--mint);margin-top:5px;letter-spacing:.3px}

/* TABS */
.tabbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.tabs{display:flex;gap:8px}
.tab{flex:0 0 auto;background:var(--paper);border:1.5px solid var(--line);color:var(--muted);
  font-family:"Jua";font-size:16px;padding:10px 20px;border-radius:13px;transition:.15s}
.tab[aria-selected=true]{background:var(--ink);color:#FBF8F1;border-color:var(--ink)}
.tabacts{display:flex;gap:8px;flex-wrap:wrap}
.actbtn{font-family:"Jua";font-size:14px;border-radius:12px;padding:10px 16px;border:1.5px solid var(--line);
  background:#fff;color:var(--ink);transition:.15s;cursor:pointer}
.actbtn:hover{border-color:var(--felt)}
.actbtn.rec{background:var(--felt);color:#fff;border-color:var(--felt)}
.actbtn.rec:hover{filter:brightness(1.06)}
.actbtn.bulk{background:#E8632E;color:#fff;border-color:#E8632E}
.actbtn.bulk:hover{filter:brightness(1.05)}
body.plays-only .tabacts{display:none}
.pfilters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pfilters>input.pfilter-search{font:inherit;font-size:13.5px;color:var(--ink);background:var(--paper);
  border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;outline:none;min-width:150px}
.pfilters>input.pfilter-search:focus{border-color:var(--felt)}
.namegate{max-width:440px;margin:30px auto;background:var(--card);border:1px solid var(--line);
  border-radius:18px;box-shadow:var(--shadow);padding:26px 24px;text-align:center}
.namegate .ng-title{font-family:"Jua";font-size:19px;color:var(--ink);margin-bottom:8px}
.namegate .ng-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:16px;word-break:keep-all}
.namegate .ng-row{display:flex;gap:8px}
.namegate #viewerInput{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;
  font:inherit;font-size:15px;outline:none}
.namegate #viewerInput:focus{border-color:var(--felt)}

/* CONTROLS */
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--paper);
  border:1.5px solid var(--line);border-radius:12px;padding:0 12px}
.search input{border:0;background:transparent;outline:none;flex:1;padding:11px 0;font:inherit;font-size:14px;color:var(--ink)}
.search svg{flex:0 0 auto;opacity:.45}
select{font:inherit;font-size:13.5px;color:var(--ink);background:var(--paper);
  border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;outline:none}
.add{background:var(--owned);color:#fff;border:0;border-radius:12px;padding:11px 18px;
  font-family:"Jua";font-size:15px;box-shadow:0 2px 6px rgba(78,135,106,.35);transition:.12s}
.add:hover{filter:brightness(1.04)}
.add:active{transform:translateY(1px);box-shadow:0 1px 3px rgba(78,135,106,.3)}
.add.alt{background:var(--jh);box-shadow:0 2px 6px rgba(58,110,165,.32)}
.add.alt:active{box-shadow:0 1px 3px rgba(58,110,165,.28)}

.chips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{background:var(--paper);border:1.5px solid var(--line);color:var(--muted);
  border-radius:999px;padding:7px 14px;font-size:13px;transition:.12s}
.fchip[aria-pressed=true]{background:var(--felt);color:#fff;border-color:var(--felt)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}

/* simplified cover grid */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.gcard2{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;cursor:pointer;
  text-align:left;padding:0;transition:.15s}
.gcard2:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(34,31,25,.14)}
.gcard2.gone{opacity:.6}
.gcard2 .cover{aspect-ratio:1/1;background:#EEE8DA;display:flex;align-items:center;justify-content:center;overflow:hidden}
.gcard2 .cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover-ph{display:flex;flex-direction:column;align-items:center;gap:4px;color:#B7AE9A;font-size:30px}
.cover-ph span{font-size:11px;font-family:"Gowun Dodum"}
.cover-ph.small{font-size:22px}
.gcard2 .gname2{font-family:"Jua";font-size:14px;line-height:1.25;color:var(--ink);padding:10px 12px;word-break:keep-all}
.gone-flag{position:absolute;top:8px;left:8px;background:var(--gone);color:#fff;font-size:11px;
  font-family:"Jua";padding:2px 8px;border-radius:999px}
.fund-flag{position:absolute;top:8px;left:8px;background:var(--gold);color:#fff;font-size:11px;
  font-family:"Jua";padding:2px 8px;border-radius:999px}
.gcard2.funding .cover{opacity:.92}
.gcard2.expansion{border-style:dashed;border-color:#CFC6B2}
.gcard2.expansion .gname2{color:var(--muted);font-size:13px}
.exp-arrow{color:#B7AE9A}
.exp-tag{position:absolute;top:8px;right:8px;background:rgba(33,69,61,.82);color:#fff;font-size:10px;
  font-family:"Jua";padding:2px 7px;border-radius:999px}

/* 리뷰 사진 */
.photo-row{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
.photo-add{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-family:"Jua";color:var(--felt);
  border:1.5px dashed var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
.photo-add:hover{border-color:var(--felt)}
.photo-thumb{position:relative;width:64px;height:64px;border-radius:9px;overflow:hidden;border:1px solid var(--line)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-rm{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;border:0;
  background:rgba(0,0,0,.6);color:#fff;font-size:13px;line-height:1;cursor:pointer}
.rev-photo{margin-top:8px}
.rev-photo img{max-width:140px;max-height:120px;border-radius:10px;border:1px solid var(--line);cursor:pointer;object-fit:cover}
.lightbox{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox img{max-width:94vw;max-height:90vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5)}

/* 여러 게임 평가 모달 */
.mrlist{max-height:46vh;overflow:auto;margin-top:8px;border:1px solid var(--line);border-radius:12px}
.mrrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line)}
.mrrow:last-child{border-bottom:0}
.mrrow input{width:18px;height:18px;accent-color:var(--felt)}
.mrname{flex:1;font-family:"Jua";font-size:14px;color:var(--ink)}
.mrdate{font-size:12px;color:var(--muted)}
.mrcard{margin-top:12px}

/* 통계 카드 헤더 인라인 셀렉트 */
.scard-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.scard-head h3{margin:0}
.inline-sel{font:inherit;font-size:13px;border:1.5px solid var(--line);border-radius:9px;padding:6px 9px;background:var(--paper);color:var(--ink);outline:none}

/* game detail modal */
.detail .detail-cover{width:100%;border-radius:12px;overflow:hidden;margin-bottom:14px;background:#EEE8DA}
.detail .detail-cover img{width:100%;display:block;max-height:300px;object-fit:contain;background:#EEE8DA}
.detail .detail-cover.ph{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
.dsec{border-top:1px solid var(--line);padding:13px 0 4px}
.dsec:first-of-type{border-top:0}
.dsec h4{margin:0 0 8px;font-family:"Jua";font-size:14px;color:var(--felt)}
.drow{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:13.5px}
.drow span{color:var(--muted)}
.drow b{font-weight:400;color:var(--ink);text-align:right;word-break:keep-all}
.dempty{font-size:13px;color:var(--muted);padding:4px 0 8px}
.sleeve-in{width:100%;min-height:60px;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;
  font:inherit;font-size:13.5px;resize:vertical;outline:none}
.sleeve-in:focus{border-color:var(--felt)}
.detail-foot{flex-wrap:wrap;gap:8px}
.btn.alt2{background:var(--jh);color:#fff}

/* recommend modal */
.rec-btn{}
.reclbl{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin-top:10px}
.rec-out{margin-top:14px}
.rec-card{display:flex;gap:14px;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:12px}
.rec-card img{width:84px;height:84px;border-radius:10px;object-fit:cover;flex:0 0 auto}
.rec-info{min-width:0}
.rec-name{font-family:"Jua";font-size:17px;color:var(--ink);word-break:keep-all}
.rec-meta{font-size:12.5px;color:var(--muted);margin:4px 0 8px}

/* plays-only shared view */
body.plays-only [data-tab="collection"]{display:none}
body.plays-only [data-tab="stats"]{display:none}
body.plays-only .tools{display:none}
body.plays-only .tabs{pointer-events:none}

.gcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 15px 13px;
  box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;gap:9px;transition:.15s}
.gcard:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(34,31,25,.13)}
.gcard.gone{opacity:.66}
.gcard .corner{position:absolute;top:0;right:0;width:30px;height:30px;
  background:linear-gradient(135deg,transparent 50%,var(--felt) 50%);border-radius:0 16px 0 0}
.gname{font-family:"Jua";font-size:17px;line-height:1.2;color:var(--ink);padding:0 18px 0 0;
  word-break:keep-all;background:none;border:0;text-align:left;width:100%;cursor:pointer;transition:.12s}
.gname:hover{color:var(--felt);text-decoration:underline;text-underline-offset:3px}
.gdesigner{font-size:11.5px;color:var(--muted);margin-top:-2px}
.gmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11.5px;padding:3px 9px;border-radius:999px;background:#F2EBDA;color:#7a6f57;white-space:nowrap}
.tag.method{background:#EAF1EC;color:#42795a}
.price{font-family:"Black Han Sans";font-size:19px;color:var(--ink);margin-top:2px}
.price small{font-family:"Gowun Dodum";font-size:11px;color:var(--muted);font-weight:400;margin-left:3px}
.gfoot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:8px;border-top:1px dashed var(--line)}
.date{font-size:11.5px;color:var(--muted)}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-family:"Jua"}
.badge.owned{background:#E6F3EA;color:var(--owned)}
.badge.gone{background:#F8E9E5;color:var(--gone)}
.plays-link{font-size:11.5px;color:var(--jh);background:none;border:0;padding:2px 0;text-decoration:underline}
.row-actions{display:flex;gap:6px}
.iconbtn{background:none;border:0;color:var(--muted);font-size:13px;padding:3px 5px;border-radius:7px}
.iconbtn:hover{background:#F1ECDF;color:var(--ink)}

/* PLAY LOG */
.plist{display:flex;flex-direction:column;gap:16px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--shadow);overflow:hidden}
.phead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:15px 18px;
  background:linear-gradient(var(--paper),var(--paper));border-bottom:1px solid var(--line)}
.ptitle{font-family:"Jua";font-size:19px;color:var(--ink)}
.pmeta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-left:2px}
.pm{font-size:12px;color:var(--muted)}
.pm b{color:var(--ink);font-weight:400}
.win{font-size:12px;background:#FBF1D8;color:#9a7b1e;padding:3px 10px;border-radius:999px;font-family:"Jua"}
.cnt{font-size:11.5px;background:#ECEFF6;color:var(--jh);padding:3px 10px;border-radius:999px}
.reviews{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:560px){.reviews{grid-template-columns:1fr}}
.rev{padding:15px 18px;border-top:1px solid var(--line)}
.rev+.rev{border-left:1px solid var(--line)}
@media(max-width:560px){.rev+.rev{border-left:0}}
.rev-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.nick{width:30px;height:30px;border-radius:9px;color:#fff;font-family:"Jua";font-size:13px;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.nickname{font-size:13px;color:var(--muted)}
.score{margin-left:8px;font-family:"Black Han Sans";font-size:20px}
.score small{font-family:"Gowun Dodum";font-size:11px;color:var(--muted);font-weight:400}
.stars{letter-spacing:1px;font-size:13px;margin-left:auto;color:var(--gold)}
.rev-top .nickname{margin-right:auto}
.gscore{font-size:12px;font-family:"Jua";background:#ECEFF6;color:var(--jh);padding:3px 10px;border-radius:999px}
.winmark{font-size:12px;margin-left:4px}
.rev-text{font-size:13.5px;color:#3c382f;white-space:pre-wrap;word-break:break-word}
.rev.empty .rev-text{color:#b8b09c}

/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty .big{font-family:"Jua";font-size:21px;color:var(--ink);margin-bottom:6px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(34,31,25,.45);display:none;
  align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow:auto}
.overlay.on{display:flex}
.modal{background:var(--paper);border-radius:20px;max-width:560px;width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,.3);animation:pop .18s ease}
@keyframes pop{from{transform:translateY(12px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;
  border-bottom:1px solid var(--line)}
.mhead h3{font-family:"Jua";font-size:19px;margin:0}
.x{background:none;border:0;font-size:22px;color:var(--muted);line-height:1}
.mbody{padding:18px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;font:inherit;font-size:14px;color:var(--ink);
  background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--felt)}
.field textarea{resize:vertical;min-height:64px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.revblock{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:13px;margin-bottom:12px}
.revblock .rh{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.revblock .rh .nick{width:26px;height:26px;font-size:12px}
.revblock .rh b{font-size:14px}
.revblock .pname{flex:1;min-width:0;font:inherit;font-size:14px;color:var(--ink);background:#fff;
  border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;outline:none}
.revblock .pname:focus{border-color:var(--felt)}
.wintog{background:#fff;border:1.5px solid var(--line);border-radius:9px;font-size:14px;padding:5px 8px;
  filter:grayscale(1);opacity:.5;transition:.12s}
.wintog.on{filter:none;opacity:1;border-color:var(--gold);background:#FBF1D8}
.revblock .rm{color:var(--muted);font-size:12px;background:none;border:0;padding:4px 6px}
.revblock .rm:hover{color:var(--gone)}
.revblock .rh .nickcode{width:auto;min-width:30px;max-width:70px;height:26px;border-radius:9px;color:#fff;
  font-family:"Jua";font-size:12px;text-align:center;border:0;outline:none;padding:0 7px;flex:0 0 auto;
  text-shadow:0 1px 1px rgba(0,0,0,.28)}
.revblock .rh .nickcode::placeholder{color:rgba(255,255,255,.7)}
.newnick{margin-top:10px;background:#fff;border:1.5px dashed var(--line);border-radius:11px;padding:12px;
  flex-direction:column;gap:8px}
.newnick input{font:inherit;font-size:14px;color:var(--ink);background:#fff;border:1.5px solid var(--line);
  border-radius:9px;padding:9px 11px;outline:none;width:100%}
.newnick input:focus{border-color:var(--felt)}
.newnick-act{display:flex;gap:8px}
.newnick-act .btn{flex:1}
.prow{display:flex;gap:12px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
.minlbl{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.revblock .revtext{display:block;width:100%;box-sizing:border-box;min-height:64px;
  border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13.5px;
  color:var(--ink);resize:vertical;outline:none}
.revblock .revtext:focus{border-color:var(--felt)}
.minlbl .gscore{font:inherit;font-size:13px;width:120px;border:1.5px solid var(--line);border-radius:9px;padding:6px 9px;outline:none;color:var(--ink)}
.minlbl .gscore:focus{border-color:var(--felt)}
.scorerow{display:flex;align-items:center;gap:10px;margin-bottom:0;flex:1;min-width:180px}
.scorerow input[type=range]{flex:1;accent-color:var(--felt)}
.scorenum{width:64px;border:1.5px solid var(--line);border-radius:9px;padding:6px 8px;font:inherit;font-size:14px;text-align:center;outline:none;color:var(--ink)}
.scorenum:focus{border-color:var(--felt)}
.scoreunit{font-size:12px;color:var(--muted)}
.scoreval{font-family:"Black Han Sans";font-size:17px;min-width:30px;text-align:right;color:var(--felt)}
.nickchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.nickchip{display:inline-flex;align-items:center;background:var(--paper);border:1.5px solid var(--line);
  color:var(--ink);border-radius:999px;font-size:13px;transition:.12s;overflow:hidden}
.nickchip:hover{border-color:var(--felt);background:#fff}
.nickchip .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.nickchip-add{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:inherit;
  font:inherit;font-size:13px;padding:6px 6px 6px 12px;cursor:pointer}

/* 통계 탭 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

.chart{display:flex;flex-direction:column;gap:7px}

.bar-label{flex:0 0 78px;font-size:12px;color:var(--muted);text-align:right;word-break:keep-all}

.subnote{font-size:12.5px;color:var(--muted);margin-top:4px}
.bar-fill span em{font-style:normal;opacity:.85;font-size:10px}
.kpi{text-align:center}
.kpi .kn{font-family:"Black Han Sans";font-size:24px;color:var(--felt)}

.kpi .kl{font-size:11.5px;color:var(--muted);margin-top:2px}

.bgg-credit .bgg-mark{display:inline-flex;color:var(--felt2)}

let HAS_LOCAL = false;
try{ const t="__bg_test__"; localStorage.setItem(t,"1"); localStorage.removeItem(t); HAS_LOCAL=true; }catch(e){ HAS_LOCAL=false; }
const mem={};
const plain = x => JSON.parse(JSON.stringify(x));

async function rawGet(k){
  if(HAS_LOCAL){ return localStorage.getItem(k); }
  return (k in mem)?mem[k]:null;
}
async function rawSet(k,v){
  if(HAS_LOCAL){ localStorage.setItem(k,v); return; }
  mem[k]=v;
}
async function sget(k){ try{ const v=await rawGet(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
async function sset(k,v){ try{ await rawSet(k, JSON.stringify(v)); toast(); }catch(e){ console.error("save fail",e); } }
let state={games:[],plays:[],nicks:[]};

async function initFirebase(){
  if(!FB_ON) return false;
  try{
    let appMod, fs;
    if(typeof window!=="undefined" && window.__MOCK_FB__){ appMod=window.__MOCK_FB__; fs=window.__MOCK_FB__; }
    else {
      appMod = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      fs     = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    }
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    const db  = fs.getFirestore(app);
    fb = { db, doc:fs.doc, getDoc:fs.getDoc, setDoc:fs.setDoc, onSnapshot:fs.onSnapshot,
           collection:fs.collection, addDoc:fs.addDoc, getDocs:fs.getDocs, deleteDoc:fs.deleteDoc };
    return true;
  }catch(e){ console.warn("Firebase 초기화 실패 → 로컬 저장으로 전환", e); fb=null; return false; }
}

/* ---------- date normalization ---------- */
// 다양한 입력(2026.4.14 / 2026-04-14 / 10.18 / 25.01.23)을 YYYY.MM.DD 로 통일.
// 연도가 없는 값(예: 10.18)은 MM.DD 로 정리하되, 연도 추정이 가능하면 보존.
function normDate(s){
  if(s==null) return "";
  let str=String(s).trim();
  if(!str) return "";
  const parts=str.split(/[.\-\/\s]+/).filter(Boolean);
  const pad=n=>String(n).padStart(2,"0");
  if(parts.length>=3){
    let [y,m,d]=parts;
    if(y.length<=2) y=String(2000+parseInt(y,10));
    return `${y}.${pad(m)}.${pad(d)}`;
  }
  if(parts.length===2){
    let [a,b]=parts;
    if(a.length===4 || parseInt(a,10)>1900){ return `${a}.${pad(b)}`; } // YYYY.MM
    return `${pad(a)}.${pad(b)}`; // MM.DD (연도 미상)
  }
  return str;
}
// 정렬용 키. 연도 없으면 최근으로 취급하지 않도록 0000 부여.
function dateKey(s){
  const n=normDate(s);
  if(!n) return "0000-00-00";
  const p=n.split(".");
  if(p.length>=3) return `${p[0]}-${p[1]}-${p[2]}`;
  if(p.length===2){
    if(p[0].length===4) return `${p[0]}-${p[1]}-00`;
    return `0000-${p[0]}-${p[1]}`;
  }
  return "0000-00-00";
}

async function load(){
  const fbReady = await initFirebase();
  if(fbReady){
    STORAGE_MODE="firebase";
    const ref = fb.doc(fb.db,"boardgame",DOC_ID);
    let snap;
    try{ snap = await fb.getDoc(ref); }catch(e){ snap=null; }
    if(snap && snap.exists()){
      const d=snap.data();
      state={games:d.games||[], plays:d.plays||[], nicks:d.nicks||SEED.nicknames};
      migrateDates();
    }else{
      state={games:SEED.games, plays:SEED.plays, nicks:SEED.nicknames};
      migrateDates();
      await fb.setDoc(ref, plain(state));
    }
    // 실시간 동기화: 다른 기기에서 바뀌면 자동 반영
    fb.onSnapshot(ref, s=>{
      if(s && s.exists()){
        const d=s.data();
        state.games=d.games||[]; state.plays=d.plays||[]; state.nicks=d.nicks||state.nicks;
        migrateDates();
        if(!RATE_MODE){ renderStats(); renderTab(); }
      }
    });
    subscribePending();
    await clearSeedPlaysOnce();
    return;
  }
  // ---- 로컬/메모리 폴백 ----
  STORAGE_MODE = HAS_LOCAL ? "local" : "memory";
  const seeded = await sget("bg_seeded_v2");
  if(!seeded){
    state = {games:SEED.games, plays:SEED.plays, nicks:SEED.nicknames};
    migrateDates();
    await rawSet("bg_seeded_v2","1");
    await persist(true);
  }else{
    state.games = await sget("bg_games") || [];
    state.plays = await sget("bg_plays") || [];
    state.nicks = await sget("bg_nicks") || SEED.nicknames;
    migrateDates();
  }
  await clearSeedPlaysOnce();
}
function migrateDates(){
  (state.games||[]).forEach(g=>{ g.date=normDate(g.date); });
  (state.plays||[]).forEach(p=>{ p.date=normDate(p.date); });
}
SEED.plays=[]; // 예시 플레이는 기본 제외(직접 입력)
async function clearSeedPlaysOnce(){
  try{ if(await sget("bg_seed_plays_cleared")) return; }catch(e){}
  const isSeed=id=>/^p([1-9]|1[0-8])$/.test(id||"");
  const before=(state.plays||[]).length;
  state.plays=(state.plays||[]).filter(p=>!isSeed(p.id));
  if(state.plays.length!==before){ await persist(true); }
  try{ await rawSet("bg_seed_plays_cleared","1"); }catch(e){}
}
async function persist(silent){
  if(STORAGE_MODE==="firebase" && fb){
    try{ await fb.setDoc(fb.doc(fb.db,"boardgame",DOC_ID), plain(state)); if(!silent) toast(); }
    catch(e){ console.error(e); toast("저장 실패"); }
    return;
  }
  try{
    await rawSet("bg_games", JSON.stringify(state.games));
    await rawSet("bg_plays", JSON.stringify(state.plays));
    await rawSet("bg_nicks", JSON.stringify(state.nicks));
    if(!silent) toast();
  }catch(e){ console.error(e); }
}
/* 친구들이 링크로 남긴 평가(pending_reviews)를 듣고 해당 플레이 기록에 자동 취합 */
function subscribePending(){
  if(!fb) return;
  fb.onSnapshot(fb.collection(fb.db,"pending_reviews"), async snap=>{
    const docs = snap.docs || [];
    let merged=0;
    for(const d of docs){
      const pr = d.data();
      if(applyPendingReview(pr)){ merged++; try{ await fb.deleteDoc(d.ref); }catch(e){} }
    }
    if(merged){
      await persist(true);
      if(!RATE_MODE){ renderStats(); renderTab(); }
      toast("친구 평가 "+merged+"건 반영됨");
    }
  });
}
function applyPendingReview(pr){
  if(!pr || !pr.playId) return false;
  const p = state.plays.find(x=>x.id===pr.playId);
  if(!p) return false;                 // 아직 그 기록이 없으면 보류(삭제 안 함)
  if(!p.reviews) p.reviews=[];
  const name = (pr.name||"손님").trim();
  const wantCode = (pr.code!=null && String(pr.code).trim()!=="") ? String(pr.code).trim() : null;
  const ex = p.reviews.find(r=>(r.name||"")===name);
  const base = ex || {name, code: wantCode || name.slice(0,2).toUpperCase(),
                      color:NICK_PALETTE[p.reviews.length%NICK_PALETTE.length], winner:false};
  if(wantCode) base.code = wantCode;   // 친구가 표시 코드를 지정하면 반영
  base.gscore = pr.gscore!=null?pr.gscore:(base.gscore||"");
  base.score  = (pr.score!=null && pr.score!=="")?Number(pr.score):(base.score??null);
  base.text   = pr.text!=null?pr.text:(base.text||"");
  if(pr.photo) base.photo = pr.photo;
  if(!ex) p.reviews.push(base);
  // 참가자 목록(칩)에도 기억 — 다음 기록에서 재사용 + 표시 코드 유지
  const exNick = state.nicks.find(n=>n.name===name);
  if(!exNick){ state.nicks.push({code:base.code, name, color:base.color}); }
  else if(wantCode && exNick.code!==wantCode){ exNick.code=wantCode; }
  return true;
}
let toastT;
function toast(msg){ const b=document.getElementById("savebar"); if(!b) return; b.textContent=msg||"저장됨"; b.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>b.classList.remove("show"),1400); }

const $=s=>document.querySelector(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const won=n=> n==null?"—":"₩"+n.toLocaleString();
function nickOf(code){ return state.nicks.find(n=>n.code===code) || {code,name:code,color:"#7C8B72"}; }
function revName(rv){ if(rv.name&&rv.name.trim()) return rv.name; const n=nickOf(rv.code); return n.name; }
function revColor(rv){ if(rv.color) return rv.color; const n=nickOf(rv.code); return n.color; }
function revCode(rv){ const c=(rv.code||revName(rv)||"?").trim(); return c.slice(0,2).toUpperCase(); }
function stars(score){ if(score==null) return ""; const f=Math.round(score); return "★".repeat(f)+"☆".repeat(Math.max(0,5-f)); }

/* ---------- collection ---------- */
function playCountFor(name){ return state.plays.filter(p=>(p.name||"").replace(/\s/g,"")===name.replace(/\s/g,"")).length; }
function matchesPlayers(g, n){
  if(n==="all") return true;
  const min=g.pmin, max=g.pmax;
  if(min==null||max==null) return false;
  if(n==="5") return max>=5;
  const k=parseInt(n,10);
  return min<=k && k<=max;
}
function matchesBest(g, n){
  if(n==="all") return true;
  const arr=g.best||[];
  if(!arr.length) return false;
  if(n==="5") return arr.some(x=>x>=5);
  return arr.includes(parseInt(n,10));
}
// 게임 상태: owned(보유) / funding(펀딩중·미도착) / gone(방출)
function gstatus(g){ if(g.status==="funding") return "funding"; return g.owned===false? "gone":"owned"; }
function isExpansion(g){ return /확장/.test(g.name||""); }
// 확장의 본판 찾기: 이름이 접두로 일치하는 비확장 게임 중 가장 긴 것
function baseOf(exp, pool){
  let best=null;
  pool.forEach(g=>{ if(g===exp||isExpansion(g)) return;
    const a=(g.name||"").replace(/\s/g,""), b=(exp.name||"").replace(/\s/g,"");
    if(a&&b.startsWith(a)){ if(!best||a.length>best.name.replace(/\s/g,"").length) best=g; }
  });
  return best;
}
// 확장을 본판 바로 아래로 정렬
function groupExpansions(list){
  const idset=new Set(list.map(g=>g.id));
  const byBase={}; const orphan=[];
  list.filter(isExpansion).forEach(e=>{ const b=baseOf(e,state.games); if(b&&idset.has(b.id)){ (byBase[b.id]=byBase[b.id]||[]).push(e);} else orphan.push(e); });
  const out=[];
  list.forEach(g=>{ if(isExpansion(g)) return; out.push(g); (byBase[g.id]||[]).forEach(e=>out.push(e)); });
  orphan.forEach(e=>{ if(!out.includes(e)) out.push(e); });
  return out;
}
// 게임 평균 평점(우리 기록 기준). person 지정 시 그 사람 평점만
function gameAvgRating(name, person){
  const scores=[];
  state.plays.forEach(p=>{ if((p.name||"").replace(/\s/g,"")!==(name||"").replace(/\s/g,"")) return;
    (p.reviews||[]).forEach(r=>{ if(person && revName(r)!==person) return; if(r.score!=null) scores.push(r.score); });
  });
  if(!scores.length) return null;
  return scores.reduce((a,b)=>a+b,0)/scores.length;
}
function applyFilters(){
  let list=state.games.slice();
  if(filter.status==="owned") list=list.filter(g=>gstatus(g)==="owned");
  if(filter.status==="gone") list=list.filter(g=>gstatus(g)==="gone");
  if(filter.status==="funding") list=list.filter(g=>gstatus(g)==="funding");
  if(filter.q){ const q=filter.q.toLowerCase(); list=list.filter(g=>(g.name+" "+(g.vendor||"")+" "+(g.designers||"")).toLowerCase().includes(q)); }
  if(filter.players&&filter.players!=="all") list=list.filter(g=>matchesPlayers(g,filter.players));
  if(filter.best&&filter.best!=="all") list=list.filter(g=>matchesBest(g,filter.best));
  if(filter.sort==="recent") list.sort((a,b)=>dateKey(b.date).localeCompare(dateKey(a.date)));
  else if(filter.sort==="name") list.sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  else if(filter.sort==="price_d") list.sort((a,b)=>(b.price||0)-(a.price||0));
  else if(filter.sort==="price_a") list.sort((a,b)=>(a.price||0)-(b.price||0));
  else if(filter.sort==="weight_d") list.sort((a,b)=>(b.weight??-1)-(a.weight??-1));
  else if(filter.sort==="weight_a") list.sort((a,b)=>(a.weight??99)-(b.weight??99));
  return list;
}
function gameCard(g){
  const cover=g.thumb||g.image;
  const st=gstatus(g), exp=isExpansion(g);
  const flag = st==="funding"?'<span class="fund-flag">펀딩중</span>' : st==="gone"?'<span class="gone-flag">방출</span>' : "";
  return `<button class="gcard2 ${st} ${exp?"expansion":""}" data-detail="${g.id}" title="${esc(g.name)}">
    <div class="cover">${cover?`<img loading="lazy" src="${esc(cover)}" alt="">`:`<div class="cover-ph">🎲<span>표지 없음</span></div>`}${exp?'<span class="exp-tag">🧩 확장</span>':""}</div>
    ${flag}
    <div class="gname2">${exp?'<span class="exp-arrow">↳ </span>':""}${esc(g.name)}</div>
  </button>`;
}

  const cover=g.image||g.thumb;
  const pc=playCountFor(g.name);
  const bggRows = g.bggId ? `
    <div class="drow"><span>표지·연도</span><b>${g.bggYear?esc(g.bggYear):"-"}</b></div>
    <div class="drow"><span>추천 인원</span><b>${esc(g.players||"-")}</b></div>

    <div class="drow"><span>난이도</span><b>${g.weight!=null?Number(g.weight).toFixed(1)+" / 5":"-"}</b></div>
    <div class="drow"><span>BGG 평균 평점</span><b>${g.bggRating!=null?Number(g.bggRating).toFixed(1)+" / 10":"-"}</b></div>
    <div class="drow"><span>BGG 순위</span><b>${g.bggRank!=null?esc(g.bggRank.toLocaleString())+"위":"-"}</b></div>

/* 랜덤 추천: 플레이 인원 / 가능 시간 조건 */
function recommendModal(){
  openModal(`
    <div class="mhead"><h3>🎲 랜덤 추천</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <div class="two">
        <div class="field"><label>플레이 인원</label>
          <select id="rec_players">
            <option value="any">상관없음</option>
            <option value="1">1인</option><option value="2">2인</option>
            <option value="3">3인</option><option value="4">4인</option><option value="5">5인+</option>
          </select></div>
        <div class="field"><label>가능 시간(분)</label><input id="rec_time" type="number" min="1" placeholder="예) 45"></div>
      </div>
      <label class="reclbl"><input type="checkbox" id="rec_owned" checked> 보유 중인 게임만</label>
      <label class="reclbl"><input type="checkbox" id="rec_best" checked> 선택 인원의 BGG BEST 게임 위주로 (BGG가 그 인원에 베스트라고 표시한 게임)</label>
      <label class="reclbl"><input type="checkbox" id="rec_high"> 평점 높은 순으로 추천 (체크 해제 시 무작위)</label>
      <div class="hint">인원·시간·BEST 조건은 BGG 정보가 있는 게임에 적용됩니다.</div>
      <button class="btn save" id="rec_go" style="width:100%;margin-top:10px">추천 받기</button>
      <div id="rec_out" class="rec-out"></div>
    </div>`);
  $("#rec_go").onclick=()=>doRecommend(true);
}
let _recQueue=[], _recIdx=0;
function doRecommend(rebuild){
  const pv=$("#rec_players").value;
  const tv=parseInt($("#rec_time").value,10);
  const ownedOnly=$("#rec_owned").checked;
  const bestFirst=$("#rec_best").checked;
  const highRated=$("#rec_high").checked;
  const out=$("#rec_out");
  if(rebuild){
    let pool=state.games.filter(g=>!ownedOnly || gstatus(g)==="owned");
    pool=pool.filter(g=>!isExpansion(g)); // 확장은 추천 대상에서 제외
    if(pv!=="any") pool=pool.filter(g=>matchesPlayers(g,pv));
    if(!isNaN(tv)) pool=pool.filter(g=> g.ptmax==null || g.ptmax<=tv );
    if(!pool.length){ out.innerHTML=`<div class="dempty">조건에 맞는 게임이 없어요. 시간을 늘리거나 인원을 바꿔보세요.</div>`; _recQueue=[]; return; }
    // BGG BEST 인원 우선 여부 (g.best = BGG가 베스트로 표시한 인원수 배열)
    const bestKey=g=>(bestFirst && pv!=="any" && matchesBest(g,pv)) ? 1 : 0;
    if(highRated){
      // BGG BEST 게임을 먼저, 그 안에서 우리 평점 높은 순
      pool.sort((x,y)=> (bestKey(y)-bestKey(x)) || ((gameAvgRating(y.name)??-1)-(gameAvgRating(x.name)??-1)) );
    } else {
      // 무작위 셔플 후, BGG BEST 게임을 앞으로
      for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
      if(bestFirst && pv!=="any") pool.sort((x,y)=>(bestKey(y)-bestKey(x)));
    }
    _recQueue=pool; _recIdx=0;
  } else {
    _recIdx=(_recIdx+1)%_recQueue.length;
  }
  if(!_recQueue.length){ out.innerHTML=`<div class="dempty">조건에 맞는 게임이 없어요.</div>`; return; }
  const g=_recQueue[_recIdx];
  const cover=g.thumb||g.image;
  const avg=gameAvgRating(g.name);
  out.innerHTML=`
    <div class="rec-card">
      ${cover?`<img src="${esc(cover)}" alt="">`:`<div class="cover-ph small">🎲</div>`}
      <div class="rec-info">
        <div class="rec-name">${esc(g.name)}</div>
        <div class="rec-meta">${[g.players,g.playtime,(g.weight!=null?"난이도 "+Number(g.weight).toFixed(1):""),(avg!=null?"우리 평점 "+avg.toFixed(1):"")].filter(Boolean).map(esc).join(" · ")||"BGG 정보 없음"}</div>
        <button class="btn" id="rec_detail">자세히 보기</button>
      </div>
    </div>
    <button class="btn save" id="rec_again" style="width:100%;margin-top:10px">🎲 다시 뽑기 (${_recIdx+1}/${_recQueue.length})</button>`;
  $("#rec_again").onclick=()=>doRecommend(false);
  $("#rec_detail").onclick=()=>{ const gid=g.id; closeModal(); gameDetail(gid); };
}

/* ---------- plays ---------- */
function allParticipantNames(){
  const s=new Set();
  state.plays.forEach(p=>(p.reviews||[]).forEach(r=>{ const n=revName(r); if(n) s.add(n); }));
  return [...s].sort((a,b)=>a.localeCompare(b,"ko"));
}
function allPlayGameNames(){
  const s=new Set();
  state.plays.forEach(p=>{ const n=(p.name||"").trim(); if(n) s.add(n); });
  return [...s].sort((a,b)=>a.localeCompare(b,"ko"));
}
function allPlayMonths(){
  const s=new Set();
  state.plays.forEach(p=>{ const k=dateKey(p.date).slice(0,7); if(k!=="0000-00"&&!k.startsWith("0000")) s.add(k); });
  return [...s].sort().reverse();
}
function renderPlays(){
  const viewerMode = PLAYS_ONLY && viewerName;
  let list=state.plays.slice().reverse();
  if(filter.pq){ list=list.filter(p=>(p.name||"").replace(/\s/g,"")===filter.pq.replace(/\s/g,"")); }
  if(viewerMode){ list=list.filter(p=>(p.reviews||[]).some(r=>revName(r)===viewerName)); }
  if(!PLAYS_ONLY){
    if(playFilter.game!=="all"){
      const q=playFilter.game;
      const exact = state.plays.some(p=>p.name===q);
      list=list.filter(p=> exact ? p.name===q : (p.name||"").includes(q));
    }
    if(playFilter.person!=="all") list=list.filter(p=>(p.reviews||[]).some(r=>revName(r)===playFilter.person));
    if(playFilter.ym!=="all") list=list.filter(p=>dateKey(p.date).slice(0,7)===playFilter.ym);
  }
  const cards=list.map(p=>{
    const revArr=p.reviews||[];
    const revs=revArr.map(rv=>{
      const nm=revName(rv), col=revColor(rv), code=revCode(rv);
      const hasText=rv.text&&rv.text.trim();
      const gs=(rv.gscore!=null&&String(rv.gscore).trim()!=="");
      const mine=(viewerMode && nm===viewerName);
      return `<div class="rev ${hasText?"":"empty"}${mine?" mine":""}">
        <div class="rev-top">
          <span class="nick" style="background:${col}">${esc(code)}</span>
          <span class="nickname">${esc(nm)}${mine?' <span class="metag">나</span>':""}${rv.winner?' <span class="winmark" title="승자">🏆</span>':""}</span>
          ${gs?`<span class="gscore">${esc(String(rv.gscore))}점</span>`:""}
          ${rv.score!=null?`<span class="score">${rv.score}<small>/5</small></span>`:`<span class="stars">평점 없음</span>`}
        </div>
        ${rv.score!=null?`<div class="stars" style="margin:0 0 6px">${stars(rv.score)}</div>`:""}
        <div class="rev-text">${hasText?esc(rv.text):"한 줄 평 없음"}</div>
        ${rv.photo?`<div class="rev-photo"><img src="${rv.photo}" alt="" data-lightbox="${rv.photo}"></div>`:""}
      </div>`;
    }).join("");
    const winners=(p.reviews||[]).filter(r=>r.winner).map(r=>revName(r));
    const winText = winners.length? winners.join(", ") : (p.winner||"");
    return `<div class="pcard">
      <div class="phead">
        <span class="ptitle">${esc(p.name)}</span>
        <div class="pmeta">
          ${p.date?`<span class="pm">📅 <b>${esc(p.date)}</b></span>`:""}
          ${p.players?`<span class="pm">👥 <b>${esc(p.players)}인</b></span>`:""}
          ${winText?`<span class="win">🏆 ${esc(winText)}</span>`:""}
          ${p.count?`<span class="cnt">${esc(p.count)}</span>`:""}
        </div>
        <div class="spacer" style="flex:1"></div>
        ${PLAYS_ONLY?"":`<div class="row-actions">
          <button class="iconbtn share" data-share="${p.id}" data-sname="${esc(p.name)}">🔗 평가 링크</button>
          <button class="iconbtn" data-pedit="${p.id}">수정</button>
          <button class="iconbtn" data-pdel="${p.id}">삭제</button>
        </div>`}
      </div>
      <div class="reviews">${revs||'<div class="rev empty"><div class="rev-text">참가자 기록 없음</div></div>'}</div>
    </div>`;
  }).join("");

  let controls, body;
  if(PLAYS_ONLY){
    if(viewerName){
      controls=`
        <div class="search" style="max-width:none;flex:1"><span style="font-size:13px;color:var(--muted)">‘${esc(viewerName)}’ 님이 함께한 플레이</span></div>
        <button class="actbtn" id="viewerChange">이름 변경</button>`;
      body = list.length
        ? `<div class="plist">${cards}</div>`
        : `<div class="empty"><div class="big">참여한 기록이 없어요</div><div>‘${esc(viewerName)}’ 님으로 기록된 플레이가 없습니다. 이름의 띄어쓰기·철자를 확인하거나, ‘이름 변경’으로 다시 입력해 주세요.</div></div>`;
    } else {
      controls=`<div style="flex:1;font-size:13px;color:var(--muted)">플레이 기록 모음</div>`;
      body=`
        <div class="namegate">
          <div class="ng-title">내 이름을 입력해 주세요</div>
          <div class="ng-desc">기록에 적힌 본인 이름을 입력하면, 본인이 참여한 플레이만 모아서 보여드려요. 참여하지 않은 게임은 보이지 않습니다.</div>
          <div class="ng-row">
            <input id="viewerInput" lang="ko" placeholder="예) 이름 / 닉네임" autocomplete="off">
            <button class="btn save" id="viewerGo">확인</button>
          </div>
        </div>`;
    }
  } else {
    const gameNames=allPlayGameNames(), persons=allParticipantNames(), months=allPlayMonths();
    const ymLabel=k=>k.slice(0,4)+"."+k.slice(5,7);
    controls=`
      <div class="pfilters">
        <input id="playGameSel" list="playGameList" lang="ko" class="pfilter-search" autocomplete="off"
          placeholder="게임 검색 (전체)" value="${playFilter.game==="all"?"":esc(playFilter.game)}">
        <datalist id="playGameList">${gameNames.map(n=>`<option value="${esc(n)}">`).join("")}</datalist>
        <select id="playPersonSel" title="참여자별">
          <option value="all" ${playFilter.person==="all"?"selected":""}>참여자 전체</option>
          ${persons.map(n=>`<option value="${esc(n)}" ${playFilter.person===n?"selected":""}>${esc(n)}</option>`).join("")}
        </select>
        <select id="playYmSel" title="일자별">
          <option value="all" ${playFilter.ym==="all"?"selected":""}>전체 기간</option>
          ${months.map(k=>`<option value="${k}" ${playFilter.ym===k?"selected":""}>${ymLabel(k)}</option>`).join("")}
        </select>
        ${(playFilter.game!=="all"||playFilter.person!=="all"||playFilter.ym!=="all")?`<button class="fchip" id="playClear">필터 해제</button>`:""}
      </div>
      <div class="spacer" style="flex:1"></div>
      <button class="actbtn" id="multiRate">📋 여러 게임 평가</button><button class="actbtn" id="sharePlays">🔗 기록만 공유</button><button class="add alt" id="addPlay">＋ 플레이 기록 추가</button>`;
    body = list.length? `<div class="plist">${cards}</div>` : `<div class="empty"><div class="big">${(playFilter.game!=="all"||playFilter.person!=="all"||playFilter.ym!=="all")?"조건에 맞는 기록이 없어요":"아직 기록이 없어요"}</div><div>${(playFilter.game!=="all"||playFilter.person!=="all"||playFilter.ym!=="all")?"필터를 바꾸거나 해제해 보세요.":"‘플레이 기록 추가’로 오늘 함께한 게임을 남겨 보세요."}</div></div>`;
  }

  $("#view").innerHTML=`<div class="controls">${controls}</div>${body}`;

  if($("#viewerGo")){
    const apply=()=>{ const v=($("#viewerInput").value||"").trim(); if(!v) { $("#viewerInput").focus(); return; } viewerName=v; renderPlays(); };
    $("#viewerGo").onclick=apply;
    $("#viewerInput").addEventListener("keydown",e=>{ if(e.key==="Enter") apply(); });
  }
  if($("#viewerChange")) $("#viewerChange").onclick=()=>{ viewerName=null; renderPlays(); };
  if($("#playGameSel")){
    const gsel=$("#playGameSel");
    const applyGame=()=>{ const v=(gsel.value||"").trim(); playFilter.game = v===""?"all":v; renderPlays(); };
    gsel.addEventListener("change", applyGame);
    gsel.addEventListener("keydown", e=>{ if(e.key==="Enter") applyGame(); });
  }
  if($("#playPersonSel")) $("#playPersonSel").onchange=e=>{ playFilter.person=e.target.value; renderPlays(); };
  if($("#playYmSel")) $("#playYmSel").onchange=e=>{ playFilter.ym=e.target.value; renderPlays(); };
  if($("#playClear")) $("#playClear").onclick=()=>{ playFilter={game:"all",person:"all",ym:"all"}; renderPlays(); };
  if($("#addPlay")) $("#addPlay").onclick=()=>playModal();
  if($("#sharePlays")) $("#sharePlays").onclick=copyPlaysLink;
  if($("#multiRate")) $("#multiRate").onclick=multiRateModal;
  if($("#clearPq")) $("#clearPq").onclick=()=>{ filter.pq=null; renderPlays(); };
  document.querySelectorAll("[data-pedit]").forEach(b=>b.onclick=()=>playModal(b.dataset.pedit));
  document.querySelectorAll("[data-pdel]").forEach(b=>b.onclick=()=>delPlay(b.dataset.pdel));
  document.querySelectorAll("[data-share]").forEach(b=>b.onclick=()=>copyShareLink(b.dataset.share, b.dataset.sname));
  document.querySelectorAll("[data-lightbox]").forEach(b=>b.onclick=()=>openLightbox(b.dataset.lightbox));
}
function openLightbox(src){
  const o=$("#overlay"); o.innerHTML=`<div class="lightbox"><img src="${src}" alt=""></div>`; o.classList.add("on");
  o.onclick=()=>{ o.classList.remove("on"); o.innerHTML=""; };

function gameModal(id){
  const g = id? state.games.find(x=>x.id===id) : {name:"",vendor:"",method:"",price:"",date:"",owned:true};
  openModal(`
    <div class="mhead"><h3>${id?"게임 수정":"게임 추가"}</h3><button class="x" data-close>×</button></div>
    <div class="mbody">
      <div class="field"><label>게임 이름 *</label><input id="f_name" lang="ko" value="${esc(g.name)}" placeholder="예) 에버델"></div>

        <div class="field"><label>구매 방법</label><input id="f_method" lang="ko" value="${esc(g.method)}" placeholder="예) 펀딩, 중고"></div>
      </div>

        <div class="field"><label>구매 가격 (원)</label><input id="f_price" type="number" value="${g.price??""}" placeholder="29000"></div>
        <div class="field"><label>구매일</label><input id="f_date" value="${esc(g.date)}" placeholder="2026.06.28"></div>
      </div>

          <option value="owned" ${gstatus(g)==="owned"?"selected":""}>보유중</option>
          <option value="funding" ${gstatus(g)==="funding"?"selected":""}>펀딩중 (아직 도착 안 함)</option>
          <option value="gone" ${gstatus(g)==="gone"?"selected":""}>방출(처분/양도)</option>

      </div>
      <div class="field"><label>표지 이미지 URL (선택 · BGG 대신 직접 지정)</label><input id="f_thumb" value="${esc(g.thumb||"")}" placeholder="https://...jpg"></div>

let draftReviews=[];
function makeParticipant(src){
  // src: a nick object, or a name string, or existing review
  if(typeof src==="string"){
    const code=src.trim().slice(0,2).toUpperCase()||"?";
    return {code, name:src.trim(), color:NICK_PALETTE[draftReviews.length%NICK_PALETTE.length], gscore:"", score:null, text:"", winner:false};
  }
  return {
    code: src.code || revCode(src),
    name: src.name || (nickOf(src.code).name),
    color: src.color || revColor(src),
    gscore: src.gscore??"", score: src.score??null, text: src.text||"", winner: !!src.winner,
    photo: src.photo||null
  };
}
// 사진을 캔버스로 축소·압축해 data URL로 (Firestore 용량 절약)
function readImageCompressed(file, maxW, quality){
  maxW=maxW||720; quality=quality||0.6;
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width,h=img.height; if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        res(c.toDataURL("image/jpeg",quality));
      }; img.onerror=rej; img.src=fr.result;
    }; fr.onerror=rej; fr.readAsDataURL(file);
  });
}

function addParticipantByName(name){ addParticipantByNameCode(name, ""); }
function addParticipantByNameCode(name, code){
  name=(name||"").trim(); if(!name) return;
  code=(code||"").trim();
  let nick=state.nicks.find(n=>n.name===name);
  if(!nick){
    nick={code: code || name.slice(0,2).toUpperCase(), name,
          color:NICK_PALETTE[state.nicks.length%NICK_PALETTE.length]};
    state.nicks.push(nick); persist(true);
  } else if(code && code!==nick.code){
    setNickCode(name, code); persist(true);
    nick=state.nicks.find(n=>n.name===name);
  }
  const dr=draftReviews.find(r=>r.name===name);
  if(!dr){ draftReviews.push(makeParticipant(nick)); }
  else if(code){ dr.code=nick.code; }
  renderNickChips(); renderDraftReviews();
}
// 표시 코드(닉네임)를 바꿀 때, 과거 기록의 표시도 깨지지 않도록 함께 갱신
function setNickCode(name, newCode){
  newCode=(newCode||"").trim(); if(!newCode) return;
  const nick=state.nicks.find(n=>n.name===name); if(!nick) return;
  const oldCode=nick.code;
  if(oldCode===newCode) return;
  nick.code=newCode;
  // 이름 없이 코드만으로 참조되던 과거 리뷰를 새 코드로 이전
  state.plays.forEach(p=>(p.reviews||[]).forEach(rv=>{
    if((!rv.name||!rv.name.trim()) && rv.code===oldCode) rv.code=newCode;
  }));
}
function renderNickChips(){

/* ---------- BoardGameGeek integration ---------- */
// ── BGG 연동 ───────────────────────────────────────────────
// 권장: 본인 전용 Cloudflare Worker 프록시 주소를 BGG_PROXY 에 넣으세요.
//   예) const BGG_PROXY = "https://bgg-proxy.이름.workers.dev";
// 비워두면 공개 프록시로 폴백하지만, 공개 프록시는 자주 막혀 불안정합니다.
// (Worker 코드는 함께 드린 bgg-proxy-worker.js 파일 참고)
const BGG_PROXY = "https://boardgame.wkdgns1457.workers.dev";

// 공개 프록시(폴백). raw / JSON({contents}) 형식을 모두 처리.
const PROXIES = [
  { build:u=>"https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u), json:false },
  { build:u=>"https://api.allorigins.win/get?url="+encodeURIComponent(u),       json:true  },
  { build:u=>"https://thingproxy.freeboard.io/fetch/"+u,                        json:false },
  { build:u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),       json:false },
];
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// 전용 프록시 주소로 BGG URL 경로를 패스스루
function proxied(bggUrl){
  const u=new URL(bggUrl);
  return BGG_PROXY.replace(/\/+$/,"") + u.pathname + u.search;
}
function xmlOf(txt){
  if(!txt || txt.indexOf("<")===-1) return null;
  const xml=new DOMParser().parseFromString(txt,"text/xml");
  if(xml.querySelector("parsererror")) return null;
  return xml;
}

// 캐싱 + 동일 요청 중복 방지 (명세 8항)
const BGG_CACHE=new Map(), BGG_INFLIGHT=new Map();
async function bggFetch(url){
  if(BGG_CACHE.has(url)) return BGG_CACHE.get(url);
  if(BGG_INFLIGHT.has(url)) return BGG_INFLIGHT.get(url);
  const job=(async()=>{
    const xml = await (BGG_PROXY ? fetchViaWorker(url) : fetchViaPublic(url));
    BGG_CACHE.set(url, xml);
    return xml;
  })();
  BGG_INFLIGHT.set(url, job);
  try{ return await job; }
  finally{ BGG_INFLIGHT.delete(url); }
}
// 전용 Worker: 202(대기)는 Worker가 서버에서 재시도하지만, 혹시 몰라 클라이언트도 5회 재시도
async function fetchViaWorker(url){
  let lastErr;
  for(let attempt=0;attempt<5;attempt++){
    try{
      const res=await fetch(proxied(url),{headers:{"Accept":"application/xml"}});
      if(res.status===202){ await sleep(2000); continue; }
      if(!res.ok) throw new Error("HTTP "+res.status);
      const xml=xmlOf(await res.text());
      if(!xml){ await sleep(1500); continue; }
      return xml;
    }catch(e){ lastErr=e; await sleep(700); }
  }
  throw lastErr||new Error("프록시 요청 실패");
}
// 공개 프록시 폴백
async function fetchViaPublic(url){
  let lastErr;
  for(const p of PROXIES){
    for(let attempt=0;attempt<3;attempt++){
      try{
        const res=await fetch(p.build(url),{headers:{"Accept":"*/*"}});
        if(res.status===202){ await sleep(1500); continue; }
        if(!res.ok) throw new Error("HTTP "+res.status);
        let txt=await res.text();
        if(p.json){ try{ const j=JSON.parse(txt); if(j&&j.contents!=null) txt=j.contents; }catch(e){} }
        const xml=xmlOf(txt);
        if(!xml){ await sleep(1200); continue; }
        return xml;
      }catch(e){ lastErr=e; await sleep(500); }
    }
  }
  throw lastErr||new Error("요청 실패");
}
async function bggSearch(name){
  const xml=await bggFetch("https://boardgamegeek.com/xmlapi2/search?type=boardgame&query="+encodeURIComponent(name));
  return [...xml.querySelectorAll("item")].slice(0,8).map(it=>({
    id: it.getAttribute("id"),
    name: (it.querySelector('name')||{}).getAttribute?.("value") || name,
    year: (it.querySelector("yearpublished")||{}).getAttribute?.("value") || ""
  }));
}
async function bggThings(ids){
  const xml=await bggFetch("https://boardgamegeek.com/xmlapi2/thing?stats=1&id="+ids.join(","));
  return [...xml.querySelectorAll("item")].map(parseThing);
}
function parseThing(it){
  const val=(sel,a="value")=>{ const e=it.querySelector(sel); return e?e.getAttribute(a):null; };
  const names=[...it.querySelectorAll("name")];
  const primary=(names.find(n=>n.getAttribute("type")==="primary")||names[0]);
  // designers (작가)
  const designers=[...it.querySelectorAll('link[type="boardgamedesigner"]')]
    .map(l=>l.getAttribute("value")).filter(Boolean);
  // suggested player count poll
  let best=[],rec=[];
  const poll=it.querySelector('poll[name="suggested_numplayers"]');
  if(poll){
    poll.querySelectorAll("results").forEach(r=>{
      const np=r.getAttribute("numplayers");
      const v={};
      r.querySelectorAll("result").forEach(x=>v[x.getAttribute("value")]=+x.getAttribute("numvotes"));
      const b=v["Best"]||0, re=v["Recommended"]||0, no=v["Not Recommended"]||0;
      if(b>=re && b>no && b>0) best.push(np);
      else if((b+re)>no && (b+re)>0) rec.push(np);
    });
  }
  const mn=val("minplayers"), mx=val("maxplayers");
  let players="";
  if(best.length) players="베스트 "+best.join(",")+"인";
  else if(rec.length) players="추천 "+rec.join(",")+"인";
  else if(mn&&mx) players=mn+"–"+mx+"인";
  const wRaw=val("statistics > ratings > averageweight") || val("averageweight");
  // 평균 평점 / BGG 순위
  const ratingRaw = val("statistics > ratings > average");
  let rank=null;
  const rankEl = it.querySelector('rank[type="subtype"][name="boardgame"]') || it.querySelector('ranks > rank');
  if(rankEl){ const rv=rankEl.getAttribute("value"); if(rv && rv!=="Not Ranked" && !isNaN(parseInt(rv,10))) rank=parseInt(rv,10); }
  // 플레이 시간
  const pt=val("playingtime"), ptMin=val("minplaytime"), ptMax=val("maxplaytime");
  let playtime="";
  if(ptMin&&ptMax&&ptMin!==ptMax) playtime=ptMin+"–"+ptMax+"분";
  else if(pt&&pt!=="0") playtime=pt+"분";
  else if(ptMax&&ptMax!=="0") playtime=ptMax+"분";
  const ptMaxNum=parseInt(ptMax||pt||ptMin||"",10);
  return {
    id: it.getAttribute("id"),
    name: primary?primary.getAttribute("value"):"",
    year: val("yearpublished")||"",
    thumb: (it.querySelector("thumbnail")||{}).textContent||"",
    image: (it.querySelector("image")||{}).textContent||"",
    weight: wRaw?parseFloat(wRaw):null,
    rating: (ratingRaw && !isNaN(parseFloat(ratingRaw)))?parseFloat(ratingRaw):null,
    rank,
    designers: designers.length?designers.join(", "):"",
    pmin: mn?parseInt(mn,10):null,
    pmax: mx?parseInt(mx,10):null,
    best: best.map(n=>parseInt(n,10)).filter(n=>!isNaN(n)),
    playtime,
    ptmax: isNaN(ptMaxNum)?null:ptMaxNum,
    players
  };
}
function applyBgg(game, t){
  game.bggId=t.id; game.thumb=t.thumb; game.image=t.image;
  game.weight=t.weight; game.players=t.players; game.bggYear=t.year;
  game.designers=t.designers; game.pmin=t.pmin; game.pmax=t.pmax;
  game.best=t.best; game.playtime=t.playtime; game.ptmax=t.ptmax;
  game.bggRating=t.rating; game.bggRank=t.rank;
}

async function bulkBgg(){
  const targets=state.games.filter(g=>g.owned && !g.bggId);
  if(!targets.length){ alert("연동할 게임이 없어요. (보유 게임은 모두 연동되었거나 없음)"); return; }
  if(!confirm(`보유 게임 중 미연동 ${targets.length}개를 자동 연동합니다.\n한글 이름은 매칭이 안 될 수 있고, BGG 속도 제한 때문에 시간이 걸려요. 진행할까요?`)) return;
  let done=0, ok=0, fail=0;
  const view=$("#view");
  const bar=document.createElement("div"); bar.className="bggbar";
  bar.innerHTML=`<span id="bgg_stat"></span><div class="progress"><i id="bgg_pi"></i></div><button class="fchip" id="bgg_stop">중단</button>`;
  view.prepend(bar);
  let stop=false; $("#bgg_stop").onclick=()=>{ stop=true; };
  for(const g of targets){
    if(stop) break;
    $("#bgg_stat").innerHTML=`<span class="spin"></span> ${esc(g.name)} (${done+1}/${targets.length})`;
    try{
      const hits=await bggSearch(g.name);
      if(hits.length){
        const det=await bggThings([hits[0].id]);
        if(det[0]){ applyBgg(g, det[0]); ok++; }
      } else fail++;
    }catch(e){ fail++; if(done===0){ $("#bgg_stat").innerHTML="연결 실패 — 이 미리보기에서는 외부 호출이 막힐 수 있어요. 호스팅한 버전에서 시도하세요."; await sleep(1800); break; } }
    done++;
    $("#bgg_pi").style.width=(done/targets.length*100)+"%";
    await persist(true);
    await sleep(1300); // respect BGG rate limit
  }
  await persist(true);
  bar.remove(); renderStats(); renderCollection();
  toast(`완료 · 연동 ${ok}개 / 실패 ${fail}개`);
}

  view.innerHTML = `<div class="ratewrap"><div class="ratecard">
    <div class="reyebrow">플레이 평가 남기기</div>
    <div class="rk">${esc(game)}</div>
    <div class="field"><label>이름 / 닉네임</label><input id="r_name" lang="ko" placeholder="예) 민수"></div>
    <div class="field"><label>표시 코드 (선택 · 비우면 자동)</label><input id="r_code" lang="ko" maxlength="6" placeholder="예) 민수 또는 MS"></div>
    <div class="field"><label>게임 점수 (선택)</label><input id="r_g" placeholder="예) 98 또는 98:86"></div>
    <div class="field"><label>평점</label>
      <div class="scorerow"><input id="r_s" type="range" min="0" max="5" step="0.1" value="4"><input class="scorenum" id="r_sn" type="number" min="0" max="5" step="0.1" value="4"><span class="scoreunit">/5</span></div>
    </div>
    <div class="field"><label>한 줄 평</label><textarea id="r_t" lang="ko" placeholder="짧게 한 줄 남겨주세요"></textarea></div>
    <div class="field"><label>사진 (선택)</label>
      <div class="photo-row"><div id="r_pthumb"></div><label class="photo-add">📷 사진 추가<input type="file" accept="image/*" id="r_photo" hidden></label></div>
    </div>
    <button class="add" id="r_submit" style="width:100%">평가 제출</button>
  </div></div>`;
  const sv=document.getElementById("r_s"), sn=document.getElementById("r_sn");
  sv.oninput=()=>{ sn.value=sv.value; };
  sn.oninput=()=>{ let v=parseFloat(sn.value); if(isNaN(v))return; v=Math.max(0,Math.min(5,v)); sv.value=v; };
  let rphoto=null;
  document.getElementById("r_photo").onchange=async e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return; try{ rphoto=await readImageCompressed(f); document.getElementById("r_pthumb").innerHTML=`<div class="photo-thumb"><img src="${rphoto}" alt=""></div>`; }catch(_){ } };
  document.getElementById("r_submit").onclick=async()=>{
    const name=document.getElementById("r_name").value.trim();
    if(!name){ document.getElementById("r_name").focus(); return; }
    const payload={ playId, game, name,
      code:document.getElementById("r_code").value.trim(),
      gscore:document.getElementById("r_g").value.trim(),
      score:parseFloat(document.getElementById("r_s").value),
      text:document.getElementById("r_t").value.trim(), ts:Date.now() };
    if(rphoto) payload.photo=rphoto;
    try{
      await fb.addDoc(fb.collection(fb.db,"pending_reviews"), payload);
      document.querySelector(".ratecard").innerHTML =
        `<div class="reyebrow">제출 완료</div><div class="rk">${esc(game)}</div>
         <p class="rmsg">고마워요, ${esc(name)}님! 평가가 호스트에게 전달됐어요.</p>`;
    }catch(e){ alert("제출에 실패했어요: "+e.message); }
  };
}
// 여러 게임을 한 번에 평가 (?rates=id1,id2,...)
async function initMultiRatePage(view){
  const ids=(URLP.get("rates")||"").split(",").map(s=>s.trim()).filter(Boolean);
  // 게임 이름 매핑: 메인 문서에서 플레이 목록을 읽어옴
  let nameMap={};
  try{ const snap=await fb.getDoc(fb.doc(fb.db,"boardgame",DOC_ID));
    if(snap.exists()){ (snap.data().plays||[]).forEach(p=>{ nameMap[p.id]=p.name; }); } }catch(e){}
  const items=ids.map(id=>({id, name:nameMap[id]||"게임"}));
  if(!items.length){ view.innerHTML=`<div class="ratewrap"><div class="ratecard"><p class="rmsg">평가할 게임이 없습니다.</p></div></div>`; return; }
  const sections=items.map((it,i)=>`
    <div class="ratecard mrcard">
      <div class="rk">${esc(it.name)}</div>
      <div class="field"><label>게임 점수 (선택)</label><input class="mg_g" data-i="${i}" placeholder="예) 98 또는 98:86"></div>
      <div class="field"><label>평점</label>
        <div class="scorerow"><input class="mg_s" data-i="${i}" type="range" min="0" max="5" step="0.1" value="4"><input class="scorenum mg_sn" data-i="${i}" type="number" min="0" max="5" step="0.1" value="4"><span class="scoreunit">/5</span></div>
      </div>
      <div class="field"><label>한 줄 평</label><textarea class="mg_t" lang="ko" data-i="${i}" placeholder="짧게 한 줄 남겨주세요"></textarea></div>
      <div class="field"><label>사진 (선택)</label>
        <div class="photo-row"><div class="mg_pt" data-i="${i}"></div><label class="photo-add">📷 사진 추가<input type="file" accept="image/*" class="mg_photo" data-i="${i}" hidden></label></div>
      </div>
    </div>`).join("");
  view.innerHTML=`<div class="ratewrap">
    <div class="ratecard">
      <div class="reyebrow">여러 게임 평가 남기기</div>
      <div class="rk" style="font-size:18px">${items.length}개 게임</div>
      <div class="field"><label>이름 / 닉네임 (한 번만 입력)</label><input id="mr_name" lang="ko" placeholder="예) 민수"></div>
      <div class="field"><label>표시 코드 (선택 · 비우면 자동)</label><input id="mr_code" lang="ko" maxlength="6" placeholder="예) 민수 또는 MS"></div>
    </div>
    ${sections}
    <button class="add" id="mr_submit" style="width:100%">전체 평가 제출</button>
    <div class="rmsg" id="mr_hint" style="text-align:center;margin-top:10px">점수를 남기고 싶지 않은 게임은 비워둬도 돼요.</div>
  </div>`;
  const photos={};
  document.querySelectorAll(".mg_s").forEach(s=>s.oninput=()=>{ const i=s.dataset.i; const n=document.querySelector('.mg_sn[data-i="'+i+'"]'); if(n)n.value=s.value; });
  document.querySelectorAll(".mg_sn").forEach(n=>n.oninput=()=>{ let v=parseFloat(n.value); if(isNaN(v))return; v=Math.max(0,Math.min(5,v)); const s=document.querySelector('.mg_s[data-i="'+n.dataset.i+'"]'); if(s)s.value=v; });
  document.querySelectorAll(".mg_photo").forEach(p=>p.onchange=async e=>{ const i=p.dataset.i; const f=e.target.files&&e.target.files[0]; if(!f)return; try{ photos[i]=await readImageCompressed(f); document.querySelector('.mg_pt[data-i="'+i+'"]').innerHTML=`<div class="photo-thumb"><img src="${photos[i]}" alt=""></div>`; }catch(_){ } });
  document.getElementById("mr_submit").onclick=async()=>{
    const name=document.getElementById("mr_name").value.trim();
    if(!name){ document.getElementById("mr_name").focus(); return; }
    const code=document.getElementById("mr_code").value.trim();
    try{
      let sent=0;
      for(let i=0;i<items.length;i++){
        const g=(document.querySelector('.mg_g[data-i="'+i+'"]').value||"").trim();
        const s=parseFloat(document.querySelector('.mg_s[data-i="'+i+'"]').value);
        const t=(document.querySelector('.mg_t[data-i="'+i+'"]').value||"").trim();
        const touched = g || t || photos[i] || (document.querySelector('.mg_sn[data-i="'+i+'"]').value!=="4");
        if(!touched) continue; // 건드리지 않은 게임은 제출 안 함
        const payload={ playId:items[i].id, game:items[i].name, name, code, gscore:g, score:s, text:t, ts:Date.now() };
        if(photos[i]) payload.photo=photos[i];
        await fb.addDoc(fb.collection(fb.db,"pending_reviews"), payload); sent++;
      }
      document.querySelector("#view .ratewrap").innerHTML=`<div class="ratecard"><div class="reyebrow">제출 완료</div><p class="rmsg">고마워요, ${esc(name)}님! ${sent}개 게임 평가가 전달됐어요.</p></div>`;
    }catch(e){ alert("제출에 실패했어요: "+e.message); }
  };
}

  if(RATE_MODE){ await initRatePage(); return; }
  if(PLAYS_ONLY){ document.body.classList.add("plays-only"); activeTab="plays"; }
  await load(); setStorageBadge(); renderStats(); renderTab();
})();
